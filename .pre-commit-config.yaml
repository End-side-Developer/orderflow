repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: local
    hooks:
      - id: theme11-quality-gate
        name: Theme 11 quality gate
        entry: python scripts/quality_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
